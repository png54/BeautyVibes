<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Vibes</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&family=El+Messiri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:linear-gradient(135deg,#fce4ec,#fdf2f5,#fce4ec);font-family:'Inter',sans-serif;color:#3d1e2c;line-height:1.6;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}
        body.rtl{direction:rtl;font-family:'El Messiri','Inter',sans-serif}
        body.rtl input,body.rtl select{text-align:right;direction:rtl}
        body.rtl .input-group label{text-align:right}
        #phone{direction:ltr!important;text-align:left!important}
        .page-wrapper{max-width:900px;width:100%;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);border-radius:3rem;padding:2rem 2rem;box-shadow:0 30px 60px -15px rgba(255,105,135,.25);position:relative;z-index:1}
        .lang-switch-wrapper{display:flex;justify-content:center;margin-bottom:1.5rem}
        .lang-switch{display:flex;gap:.5rem;background:rgba(255,228,235,.7);border-radius:3rem;padding:.4rem;direction:ltr}
        .lang-btn{padding:.6rem 1.6rem;border-radius:2rem;border:none;cursor:pointer;font-weight:600;font-size:.9rem;background:transparent;color:#b3446c;transition:.3s}
        .lang-btn.active{background:linear-gradient(135deg,#e91e63,#f06292);color:#fff;transform:scale(1.03)}
        .brand{text-align:center;margin-bottom:2rem}
        .brand h1{font-family:'Playfair Display',serif;font-size:3.5rem;font-weight:700;background:linear-gradient(135deg,#e91e63,#f48fb1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-transform:uppercase}
        .brand .tagline{font-size:1rem;color:#c2185b;border-top:1px dashed rgba(233,30,99,.35);display:inline-block;padding-top:.5rem;margin-top:.2rem}
        .products-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:1.2rem;margin:2rem 0}
        .product-card{flex:1 1 155px;min-width:145px;max-width:165px;background:rgba(255,255,255,.7);border-radius:2rem;padding:1.2rem .7rem;border:1px solid rgba(255,192,203,.5);cursor:pointer;text-align:center;transition:.3s;position:relative}
        .product-card:hover{transform:translateY(-5px);border-color:#f48fb1}
        .product-card.selected{border:2.5px solid #e91e63;background:rgba(255,240,245,.85);box-shadow:0 0 0 6px rgba(233,30,99,.1)}
        .product-img{width:130px;height:130px;border-radius:1.5rem;object-fit:cover;margin-bottom:.6rem;background:#fce4ec}
        .product-name{font-weight:600;font-size:.9rem;color:#5c1d36;margin:.3rem 0}
        .product-price{font-weight:700;font-size:.9rem;color:#e91e63;background:rgba(255,228,235,.8);padding:.2rem .8rem;border-radius:2rem;direction:ltr;display:inline-block}
        .qty-selector{display:flex;align-items:center;justify-content:center;gap:.4rem;margin-top:.5rem}
        .qty-btn{width:28px;height:28px;border-radius:50%;border:1px solid #e91e63;background:#fff;color:#e91e63;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:bold;transition:.2s;line-height:1;padding:0}
        .qty-btn:hover{background:#e91e63;color:#fff}
        .qty-num{font-weight:700;font-size:1rem;color:#3d1e2c;min-width:20px;text-align:center}
        .check-mark{position:absolute;top:10px;right:10px;background:#e91e63;color:#fff;border-radius:50%;width:24px;height:24px;display:none;align-items:center;justify-content:center;font-size:12px}
        body.rtl .check-mark{right:auto;left:10px}
        .product-card.selected .check-mark{display:flex}
        .total-section{background:rgba(255,240,245,.7);border-radius:2rem;padding:1.3rem 1.8rem;margin:1.5rem 0;border:1px solid rgba(255,182,193,.5)}
        .total-row{display:flex;justify-content:space-between;padding:.25rem 0;font-size:.95rem;color:#5c1d36}
        .total-row.final{font-size:1.4rem;font-weight:700;color:#e91e63;border-top:1px dashed rgba(233,30,99,.3);margin-top:.4rem;padding-top:.7rem}
        .form-grid{display:flex;flex-direction:column;gap:.8rem}
        .input-group{display:flex;flex-direction:column;gap:.25rem}
        .input-group label{font-size:.8rem;font-weight:600;color:#881c42;text-align:left}
        input,select{background:rgba(255,255,255,.7);border:1px solid rgba(255,160,180,.5);border-radius:1.2rem;padding:.85rem 1.2rem;font-size:.9rem;outline:none;direction:ltr;text-align:left;transition:.3s}
        input:focus,select:focus{border-color:#e91e63;box-shadow:0 0 0 3px rgba(233,30,99,.08)}
        #dairaSelect:disabled,#addressInput:disabled{opacity:.5}
        .radio-group{display:flex;gap:1.2rem;flex-wrap:wrap}
        .radio-group label{display:flex;align-items:center;gap:.3rem;cursor:pointer;font-size:.85rem;color:#5c1d36}
        .radio-group input[type="radio"]{accent-color:#e91e63;width:17px;height:17px}
        .double-input,.location-row{display:flex;gap:.7rem;flex-wrap:wrap}
        .double-input .input-group,.location-row .input-group{flex:1 1 45%}
        .submit-btn{background:linear-gradient(135deg,#e91e63,#f48fb1);color:#fff;border:none;font-size:1.1rem;font-weight:600;padding:1.1rem;border-radius:2.5rem;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:.3s;box-shadow:0 12px 30px rgba(233,30,99,.35)}
        .submit-btn:hover{transform:translateY(-2px)}
        .submit-btn:disabled{opacity:.5;pointer-events:none;background:#e0b0c0;box-shadow:none}
        .error-message{color:#d32f2f;font-size:.8rem;display:none;background:rgba(255,205,210,.4);padding:.5rem 1rem;border-radius:1rem}
        .success-message{background:rgba(232,245,233,.8);color:#2e7d32;padding:1rem;border-radius:1.2rem;text-align:center;display:none}
        .shipping-info{font-size:.75rem;color:#881c42;margin-top:.15rem;display:none}
        .pricing-note{background:rgba(255,228,235,.6);border-radius:1.5rem;padding:.7rem 1.2rem;text-align:center;color:#c2185b;margin:.8rem 0;font-weight:500;font-size:.85rem}
        @media(max-width:600px){.page-wrapper{padding:1.5rem 1rem}.product-img{width:105px;height:105px}.brand h1{font-size:2.4rem}}
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="lang-switch-wrapper">
            <div class="lang-switch">
                <button class="lang-btn active" id="btnFr" onclick="switchLanguage('fr')">🇫🇷 Français</button>
                <button class="lang-btn" id="btnAr" onclick="switchLanguage('ar')">🇩🇿 العربية</button>
            </div>
        </div>
        <div class="brand">
            <h1>Beauty Vibes</h1>
            <div class="tagline" id="tagline">Plus que la beauté • Un éclat qui inspire confiance</div>
        </div>

        <div class="products-grid" id="productsContainer"></div>

        <div class="pricing-note"><span>💖</span> <span id="pricingText">1=1500 | 2=3000 | 3=3500🎁 | +1300/h | Promos</span></div>
        <div class="total-section">
            <div class="total-row"><span id="lblSubtotal">Sous-total :</span><span id="subtotalDisplay">0 DA</span></div>
            <div class="total-row"><span id="lblShipping">Livraison :</span><span id="shippingDisplay">-- DA</span></div>
            <div class="total-row final"><span id="lblTotal">Total :</span><span id="totalDisplay">0 DA</span></div>
        </div>
        <div class="form-grid">
            <div class="double-input">
                <div class="input-group"><label id="lblFirstName">Prénom</label><input id="firstName" placeholder="Votre prénom"></div>
                <div class="input-group"><label id="lblLastName">Nom</label><input id="lastName" placeholder="Votre nom"></div>
            </div>
            <div class="input-group"><label id="lblPhone">Téléphone</label><input type="tel" id="phone" placeholder="Ex: 0555 12 34 56" dir="ltr"></div>
            <div class="location-row">
                <div class="input-group"><label id="lblWilaya">Wilaya</label><select id="wilayaSelect"><option value="" disabled selected>-- Sélectionnez --</option></select></div>
                <div class="input-group"><label id="lblDaira">Daïra</label><select id="dairaSelect" disabled><option value="" disabled selected>-- Choisissez wilaya --</option></select></div>
            </div>
            <div class="input-group">
                <label id="lblDelivery">Type de livraison</label>
                <div class="radio-group">
                    <label><input type="radio" name="deliveryType" value="home" onchange="updateShipping()"> <span id="optHome">🏠 Domicile</span></label>
                    <label><input type="radio" name="deliveryType" value="office" onchange="updateShipping()"> <span id="optOffice">🏢 Bureau</span></label>
                </div>
                <span class="shipping-info" id="shippingInfo"></span>
            </div>
            <div class="input-group">
                <label id="lblAddress">Adresse exacte</label>
                <input id="addressInput" placeholder="Rue, N°, Commune..." disabled>
            </div>
            <div class="error-message" id="formError"></div>
            <button class="submit-btn" id="submitOrderBtn" disabled>Commander ✨</button>
            <div class="success-message" id="successMessage"></div>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://muddy-scene-f7c3.abdou2901200100.workers.dev';

        const shippingCosts={ "Alger":[590,450],"Oran":[700,550],"Sidi Bel Abbès":[700,550],"Mostaganem":[700,550],"Mascara":[700,550],"Aïn Témouchent":[700,550],"Chlef":[700,550],"Oum El Bouaghi":[900,650],"Batna":[900,650],"Béjaïa":[900,650],"Blida":[900,650],"Bouira":[900,650],"Tlemcen":[900,650],"Tiaret":[900,650],"Tizi Ouzou":[900,650],"Jijel":[900,650],"Sétif":[900,650],"Saïda":[900,650],"Skikda":[900,650],"Annaba":[900,650],"Guelma":[900,650],"Constantine":[900,650],"Médéa":[900,650],"M'Sila":[900,650],"Bordj Bou Arreridj":[900,650],"Boumerdès":[900,650],"El Tarf":[900,650],"Tissemsilt":[900,650],"Khenchela":[900,650],"Souk Ahras":[900,650],"Tipaza":[900,650],"Mila":[900,650],"Aïn Defla":[900,650],"Relizane":[900,650],"Laghouat":[950,750],"Biskra":[950,750],"Béchar":[950,750],"Tébessa":[950,750],"Djelfa":[950,750],"Ouargla":[950,750],"El Oued":[950,750],"Ghardaïa":[950,750],"Ouled Djellal":[950,750],"Béni Abbès":[950,750],"Touggourt":[950,750],"El M'Ghair":[950,750],"El Menia":[950,750],"Adrar":[1050,850],"El Bayadh":[1050,850],"Naâma":[1050,850],"Timimoun":[1050,850],"Bordj Badji Mokhtar":[1050,850],"Tamanrasset":[1600,1400],"Illizi":[1600,1400],"Tindouf":[1600,1400],"In Salah":[1600,1400],"In Guezzam":[1600,1400],"Djanet":[1600,1400] };

        const products = [
            {id:1,name:"Sérum Éclat",price:1500,img:"1.jfif"},
            {id:2,name:"Crème Hydratante",price:1500,img:"2.jfif"},
            {id:3,name:"Masque à l'Argile",price:1500,img:"3.jfif"},
            {id:4,name:"Tonique Rafraîchissant",price:1500,img:"4.jfif"},
            {id:5,name:"Baume à Lèvres",price:1500,img:"5.jfif"}
        ];

        const container = document.getElementById('productsContainer');
        products.forEach(p => {
            container.innerHTML += `
                <div class="product-card" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}" onclick="toggleProduct(this)">
                    <span class="check-mark">✓</span>
                    <img src="${p.img}" class="product-img" onerror="this.style.background='#fce4ec'">
                    <span class="product-name">${p.name}</span>
                    <span class="product-price">1 500 DA</span>
                    <div class="qty-selector" onclick="event.stopPropagation()">
                        <button class="qty-btn" onclick="changeQty(${p.id}, -1)">−</button>
                        <span class="qty-num" id="qty-${p.id}">0</span>
                        <button class="qty-btn" onclick="changeQty(${p.id}, 1)">+</button>
                    </div>
                </div>`;
        });

        let currentLang='fr',currentShipping=0;
        const cart = {};

        function calcTotalPrice(totalQty) {
            if (totalQty === 0) return 0;
            const priceTable = {
                1:1500,2:3000,3:3500,4:4800,5:6100,6:7000,7:8300,8:9600,9:10500,10:11800,
                11:13100,12:14000,13:15300,14:16600,15:17500,16:18800,17:20100,18:21000,
                19:22300,20:23600,21:24500,22:25800,23:27100,24:28000,25:29300,
                26:30600,27:31500,28:32800,29:34100,30:35000
            };
            if (totalQty <= 30) return priceTable[totalQty];
            return 35000 + (totalQty - 30) * 1300;
        }

        function getTotalQty() { return Object.values(cart).reduce((sum,q)=>sum+q,0); }

        function updateAllTotals() {
            const totalQty = getTotalQty();
            const sub = calcTotalPrice(totalQty);
            const cur = tt[currentLang].currency;
            document.getElementById('subtotalDisplay').textContent = sub.toLocaleString('fr-FR') + ' ' + cur;
            document.getElementById('shippingDisplay').textContent = currentShipping ? currentShipping.toLocaleString('fr-FR') + ' ' + cur : '-- ' + cur;
            document.getElementById('totalDisplay').textContent = (sub + currentShipping).toLocaleString('fr-FR') + ' ' + cur;
            document.getElementById('submitOrderBtn').disabled = totalQty === 0;
        }

        window.changeQty = function(id, delta) {
            if (!cart[id]) cart[id] = 0;
            cart[id] = Math.max(0, cart[id] + delta);
            document.getElementById('qty-'+id).textContent = cart[id];
            const card = document.querySelector(`.product-card[data-id="${id}"]`);
            if (cart[id] > 0) card.classList.add('selected');
            else card.classList.remove('selected');
            updateAllTotals();
        };

        window.toggleProduct = function(card) {
            const id = parseInt(card.dataset.id);
            if (cart[id] && cart[id] > 0) { cart[id] = 0; card.classList.remove('selected'); }
            else { cart[id] = 1; card.classList.add('selected'); }
            document.getElementById('qty-'+id).textContent = cart[id] || 0;
            updateAllTotals();
        };

        function extractWilayaName(full) { return full.replace(/^\d+\s*-\s*/, '').trim(); }
        function getShippingCost(fullWilaya, type) {
            const name = extractWilayaName(fullWilaya);
            if (!shippingCosts[name]) return 0;
            return type === 'home' ? shippingCosts[name][0] : shippingCosts[name][1];
        }

        window.updateShipping = function() {
            const wl = document.getElementById('wilayaSelect').value;
            const dt = document.querySelector('input[name="deliveryType"]:checked');
            const addr = document.getElementById('addressInput'), info = document.getElementById('shippingInfo');
            if (wl && dt) {
                currentShipping = getShippingCost(wl, dt.value);
                document.getElementById('shippingDisplay').textContent = currentShipping.toLocaleString('fr-FR') + ' ' + tt[currentLang].currency;
                addr.disabled = false; info.style.display = 'block';
                info.textContent = currentLang==='fr' ? `Frais: ${currentShipping} DA (${dt.value==='home'?'Domicile':'Bureau'})` : `التكلفة: ${currentShipping} دج (${dt.value==='home'?'منزل':'مكتب'})`;
            } else {
                currentShipping = 0;
                document.getElementById('shippingDisplay').textContent = '-- ' + tt[currentLang].currency;
                addr.disabled = true; info.style.display = 'none';
            }
            updateAllTotals();
        };

        const tt={
            fr:{tagline:"Plus que la beauté • Un éclat qui inspire confiance",pricingText:'1=1500 | 2=3000 | 3=3500🎁 | +1300/h | Promos',lblSubtotal:"Sous-total :",lblShipping:"Livraison :",lblTotal:"Total :",lblFirstName:"Prénom",lblLastName:"Nom",lblPhone:"Téléphone",lblWilaya:"Wilaya",lblDaira:"Daïra",lblDelivery:"Type de livraison",optHome:"🏠 Domicile",optOffice:"🏢 Bureau",lblAddress:"Adresse exacte",firstNamePlaceholder:"Votre prénom",lastNamePlaceholder:"Votre nom",phonePlaceholder:"Ex: 0555 12 34 56",addressPlaceholder:"Rue, N°, Commune...",submitBtn:"Commander ✨",errorSelect:"Sélectionnez au moins 1 produit.",errorFields:"Remplissez tous les champs.",errorDelivery:"Choisissez le type de livraison.",successMsg:"✅ Commande envoyée ! 🌿",errorTelegram:"❌ Erreur.",currency:"DA"},
            ar:{tagline:"أكثر من جمال • إشراقة تلهب الثقة",pricingText:'1=1500 | 2=3000 | 3=3500🎁 | +1300/ح | خصومات',lblSubtotal:"المجموع الفرعي :",lblShipping:"التوصيل :",lblTotal:"المجموع :",lblFirstName:"الاسم",lblLastName:"اللقب",lblPhone:"رقم الهاتف",lblWilaya:"الولاية",lblDaira:"الدائرة",lblDelivery:"نوع التوصيل",optHome:"🏠 المنزل",optOffice:"🏢 المكتب",lblAddress:"العنوان بالضبط",firstNamePlaceholder:"أدخل اسمك",lastNamePlaceholder:"أدخل لقبك",phonePlaceholder:"Ex: 0555 12 34 56",addressPlaceholder:"الشارع، الرقم، البلدية...",submitBtn:"✨ أرسل الطلب",errorSelect:"اختر منتجاً واحداً على الأقل.",errorFields:"املأ جميع الحقول.",errorDelivery:"اختر نوع التوصيل.",successMsg:"✅ تم الإرسال! 🌿",errorTelegram:"❌ خطأ.",currency:"دج"}
        };

        function populateWilayas(lang){
            const s=document.getElementById('wilayaSelect');
            s.innerHTML=`<option value="" disabled selected>${lang==='fr'?'-- Sélectionnez --':'-- اختر الولاية --'}</option>`;
            Object.keys(wilayasData).forEach(w=>{const o=document.createElement('option');o.value=w;o.textContent=w;s.appendChild(o);});
            resetDairaSelect(lang);
        }
        function resetDairaSelect(lang){
            const s=document.getElementById('dairaSelect');
            s.innerHTML=`<option value="" disabled selected>${lang==='fr'?'-- Choisissez wilaya --':'-- اختر الولاية أولا --'}</option>`;
            s.disabled=true;
        }
        document.getElementById('wilayaSelect').addEventListener('change',function(){
            const sw=this.value;const s=document.getElementById('dairaSelect');s.innerHTML='';
            if(sw&&wilayasData[sw]){
                s.innerHTML=`<option value="" disabled selected>${currentLang==='fr'?'-- Sélectionnez daïra --':'-- اختر الدائرة --'}</option>`;
                wilayasData[sw].forEach(dr=>{const o=document.createElement('option');o.value=dr;o.textContent=dr;s.appendChild(o);});
                s.disabled=false;
            }else{resetDairaSelect(currentLang);}
            updateShipping();
        });
        window.switchLanguage=function(lang){
            currentLang=lang;const t=tt[lang];
            document.body.classList.toggle('rtl',lang==='ar');
            document.documentElement.dir=lang==='ar'?'rtl':'ltr';
            document.getElementById('btnFr').classList.toggle('active',lang==='fr');
            document.getElementById('btnAr').classList.toggle('active',lang==='ar');
            ['tagline','lblSubtotal','lblShipping','lblTotal','lblFirstName','lblLastName','lblPhone','lblWilaya','lblDaira','lblDelivery','lblAddress','optHome','optOffice'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=t[id];});
            document.getElementById('pricingText').innerHTML=t.pricingText;
            document.getElementById('firstName').placeholder=t.firstNamePlaceholder;
            document.getElementById('lastName').placeholder=t.lastNamePlaceholder;
            document.getElementById('phone').placeholder=t.phonePlaceholder;
            document.getElementById('addressInput').placeholder=t.addressPlaceholder;
            document.getElementById('submitOrderBtn').textContent=t.submitBtn;
            populateWilayas(lang);updateAllTotals();
        };

        document.getElementById('submitOrderBtn').addEventListener('click',async function(e){
            e.preventDefault();const t=tt[currentLang];
            const fn=document.getElementById('firstName').value.trim(),ln=document.getElementById('lastName').value.trim();
            const ph=document.getElementById('phone').value.trim(),wl=document.getElementById('wilayaSelect').value;
            const dr=document.getElementById('dairaSelect').value,dt=document.querySelector('input[name="deliveryType"]:checked');
            const addr=document.getElementById('addressInput').value.trim();
            const er=document.getElementById('formError'),sm=document.getElementById('successMessage');
            if(!fn||!ln||!ph||!wl||!dr||!dt||!addr||getTotalQty()===0){
                er.textContent=getTotalQty()===0?t.errorSelect:!dt?t.errorDelivery:t.errorFields;
                er.style.display='block';return;
            }
            if(!/^[0-9+\s()-]{8,}$/.test(ph)){er.textContent='Numéro invalide';er.style.display='block';return;}
            const btn=document.getElementById('submitOrderBtn');btn.disabled=true;btn.textContent='⏳ ...';er.style.display='none';sm.style.display='none';
            const totalQty=getTotalQty(),sub=calcTotalPrice(totalQty),total=sub+currentShipping;
            const cartProducts = [];
            Object.entries(cart).forEach(([id,q])=>{
                if(q>0){const p=products.find(x=>x.id===parseInt(id));cartProducts.push({...p, qty: q});}
            });
            let sv='';
            if(totalQty>=3){const normal=totalQty*1500;if(normal>sub)sv='\n💸 Économisé: '+(normal-sub).toLocaleString('fr-FR')+' DA';}
            try{
                const res=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({products:cartProducts,count:totalQty,subtotal:sub,shipping:currentShipping,total,savings:sv,deliveryType:dt.value,customer:{firstName:fn,lastName:ln,phone:ph,wilaya:wl,daira:dr,address:addr}})});
                const data=await res.json();
                if(data.success){
                    sm.textContent=t.successMsg;sm.style.display='block';
                    Object.keys(cart).forEach(k=>{cart[k]=0;document.getElementById('qty-'+k).textContent='0';});
                    document.querySelectorAll('.product-card.selected').forEach(c=>c.classList.remove('selected'));
                    ['firstName','lastName','phone','addressInput'].forEach(id=>document.getElementById(id).value='');
                    document.getElementById('wilayaSelect').value='';resetDairaSelect(currentLang);
                    document.querySelectorAll('input[name="deliveryType"]').forEach(r=>r.checked=false);
                    document.getElementById('addressInput').disabled=true;currentShipping=0;updateAllTotals();
                    setTimeout(()=>sm.style.display='none',5000);
                }else{er.textContent=t.errorTelegram;er.style.display='block';}
            }catch(err){er.textContent=t.errorTelegram;er.style.display='block';}
            btn.disabled=false;btn.textContent=t.submitBtn;
        });

        populateWilayas('fr');updateAllTotals();
    </script>
</body>
</html>
