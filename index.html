<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Beauty Vibes • إشراقة أناقتك</title>
    <!-- خطوط عصرية ونظيفة -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fdfaf7;
            font-family: 'Inter', 'El Messiri', sans-serif;
            color: #2e2a28;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .page-wrapper {
            max-width: 720px;
            width: 100%;
            background: #ffffff;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            padding: 2rem 1.8rem;
            background: linear-gradient(180deg, #ffffff 0%, #fefcf9 100%);
            border: 1px solid rgba(235, 215, 195, 0.4);
        }

        /* الشعار والعنوان */
        .brand {
            text-align: center;
            margin-bottom: 2.2rem;
        }

        .brand h1 {
            font-family: 'El Messiri', serif;
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #3e2c23;
            background: linear-gradient(135deg, #c0986b, #8b5a3a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.2rem;
        }

        .brand .tagline {
            font-size: 1rem;
            font-weight: 400;
            color: #8b7a6b;
            letter-spacing: 0.3px;
            border-top: 1px dashed #e3d6c8;
            display: inline-block;
            padding-top: 0.5rem;
            margin-top: 0.2rem;
        }

        /* شبكة المنتجات */
        .products-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin: 1.8rem 0 2rem;
        }

        .product-card {
            flex: 1 1 100px;
            min-width: 85px;
            max-width: 120px;
            background: #ffffff;
            border-radius: 1.8rem;
            padding: 0.8rem 0.5rem 0.8rem;
            box-shadow: 0 10px 20px -10px rgba(120, 80, 50, 0.12);
            border: 1px solid #f1e4d7;
            transition: all 0.25s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background: #fffbf7;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-4px);
            border-color: #d9b692;
            box-shadow: 0 20px 25px -12px rgba(160, 110, 70, 0.2);
        }

        .product-card.selected {
            border: 2px solid #b2825c;
            background: #fff6ef;
            box-shadow: 0 0 0 3px rgba(178, 130, 92, 0.2);
        }

        .product-img {
            width: 75px;
            height: 75px;
            border-radius: 1.2rem;
            object-fit: cover;
            background: #f7ede2;
            margin-bottom: 0.5rem;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        .product-card.selected .product-img {
            box-shadow: 0 8px 16px rgba(139, 90, 58, 0.25);
        }

        .product-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: #4d3829;
            margin: 0.2rem 0;
            font-family: 'El Messiri', sans-serif;
        }

        .product-price {
            font-weight: 700;
            font-size: 0.9rem;
            color: #7b5c46;
            background: #fcf3ea;
            padding: 0.15rem 0.7rem;
            border-radius: 2rem;
            display: inline-block;
            margin-top: 0.1rem;
        }

        .check-mark {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #b2825c;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .product-card.selected .check-mark {
            display: flex;
        }

        .rule-info {
            background: #faf5f0;
            border-radius: 3rem;
            padding: 0.7rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #5c4332;
            margin: 0.8rem 0 1.5rem;
            border: 1px solid #eddacb;
            font-weight: 500;
        }

        .rule-info i {
            font-style: normal;
            font-size: 1.1rem;
        }

        .total-section {
            background: #f6efe8;
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            margin: 1.5rem 0 1.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border: 1px solid #e2cfbc;
        }

        .total-label {
            font-weight: 600;
            font-size: 1.1rem;
            color: #4b3627;
        }

        .total-price {
            font-size: 2rem;
            font-weight: 700;
            color: #3e2c23;
            letter-spacing: -0.3px;
        }

        .total-price span {
            font-size: 1rem;
            font-weight: 500;
            color: #7e6755;
            margin-right: 0.2rem;
        }

        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 1.5rem 0 1rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .input-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #5f4b3a;
            letter-spacing: 0.3px;
        }

        input, select {
            background: #ffffff;
            border: 1px solid #e1cfbc;
            border-radius: 1.2rem;
            padding: 0.85rem 1.2rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
            background: #fefcf9;
            color: #2e2a28;
        }

        input:focus, select:focus {
            border-color: #b2825c;
            box-shadow: 0 0 0 3px rgba(178, 130, 92, 0.15);
        }

        .double-input {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .double-input .input-group {
            flex: 1 1 45%;
        }

        .submit-btn {
            background: #b2825c;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 1rem 2rem;
            border-radius: 2.5rem;
            width: 100%;
            cursor: pointer;
            transition: 0.25s;
            background: linear-gradient(135deg, #b2825c, #8b5a3a);
            letter-spacing: 0.5px;
            margin-top: 0.8rem;
            box-shadow: 0 8px 18px rgba(139, 90, 58, 0.25);
            border: 1px solid #a77852;
            font-family: 'El Messiri', sans-serif;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #c79a73, #9f6a48);
            box-shadow: 0 12px 22px rgba(139, 90, 58, 0.35);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
            background: #cdbcab;
            border-color: #c7b3a0;
            box-shadow: none;
        }

        .error-message {
            color: #c04e3a;
            font-size: 0.8rem;
            margin-top: 0.2rem;
            display: none;
        }

        .success-message {
            background: #e7f3e9;
            color: #2b4b2f;
            padding: 0.8rem;
            border-radius: 1rem;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }

        @media (max-width: 500px) {
            .page-wrapper {
                padding: 1.5rem 1rem;
            }
            .product-card {
                min-width: 70px;
                max-width: 95px;
            }
            .product-img {
                width: 65px;
                height: 65px;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="brand">
            <h1>Beauty Vibes</h1>
            <div class="tagline">أكثر من جمال • إطلالة تشع ثقة</div>
        </div>

        <!-- شبكة المنتجات الخمسة -->
        <div class="products-grid" id="productsContainer">
            <!-- المنتج 1 -->
            <div class="product-card" data-id="1" data-name="سيروم الإشراقة" data-price="2400" onclick="toggleProduct(this)">
                <span class="check-mark">✓</span>
                <img src="1.jfif" alt="منتج 1" class="product-img" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2275%22 height=%2275%22 fill=%22%23d9c3ad%22%3E%3Crect width=%2275%22 height=%2275%22 rx=%2215%22/%3E%3Ctext x=%2237.5%22 y=%2245%22 text-anchor=%22middle%22 fill=%22%23fff%22 font-size=%2212%22%3E1%3C/text%3E%3C/svg%3E'">
                <span class="product-name">سيروم</span>
                <span class="product-price">2400 دج</span>
            </div>
            <!-- المنتج 2 -->
            <div class="product-card" data-id="2" data-name="كريم مرطب" data-price="1950" onclick="toggleProduct(this)">
                <span class="check-mark">✓</span>
                <img src="2.jfif" alt="منتج 2" class="product-img" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2275%22 height=%2275%22 fill=%22%23d9c3ad%22%3E%3Crect width=%2275%22 height=%2275%22 rx=%2215%22/%3E%3Ctext x=%2237.5%22 y=%2245%22 text-anchor=%22middle%22 fill=%22%23fff%22 font-size=%2212%22%3E2%3C/text%3E%3C/svg%3E'">
                <span class="product-name">مرطب</span>
                <span class="product-price">1950 دج</span>
            </div>
            <!-- المنتج 3 -->
            <div class="product-card" data-id="3" data-name="ماسك الطين" data-price="1800" onclick="toggleProduct(this)">
                <span class="check-mark">✓</span>
                <img src="3.jfif" alt="منتج 3" class="product-img" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2275%22 height=%2275%22 fill=%22%23d9c3ad%22%3E%3Crect width=%2275%22 height=%2275%22 rx=%2215%22/%3E%3Ctext x=%2237.5%22 y=%2245%22 text-anchor=%22middle%22 fill=%22%23fff%22 font-size=%2212%22%3E3%3C/text%3E%3C/svg%3E'">
                <span class="product-name">ماسك</span>
                <span class="product-price">1800 دج</span>
            </div>
            <!-- المنتج 4 -->
            <div class="product-card" data-id="4" data-name="تونر منعش" data-price="1500" onclick="toggleProduct(this)">
                <span class="check-mark">✓</span>
                <img src="4.jfif" alt="منتج 4" class="product-img" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2275%22 height=%2275%22 fill=%22%23d9c3ad%22%3E%3Crect width=%2275%22 height=%2275%22 rx=%2215%22/%3E%3Ctext x=%2237.5%22 y=%2245%22 text-anchor=%22middle%22 fill=%22%23fff%22 font-size=%2212%22%3E4%3C/text%3E%3C/svg%3E'">
                <span class="product-name">تونر</span>
                <span class="product-price">1500 دج</span>
            </div>
            <!-- المنتج 5 -->
            <div class="product-card" data-id="5" data-name="بلسم شفاه" data-price="1100" onclick="toggleProduct(this)">
                <span class="check-mark">✓</span>
                <img src="5.jfif" alt="منتج 5" class="product-img" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2275%22 height=%2275%22 fill=%22%23d9c3ad%22%3E%3Crect width=%2275%22 height=%2275%22 rx=%2215%22/%3E%3Ctext x=%2237.5%22 y=%2245%22 text-anchor=%22middle%22 fill=%22%23fff%22 font-size=%2212%22%3E5%3C/text%3E%3C/svg%3E'">
                <span class="product-name">بلسم</span>
                <span class="product-price">1100 دج</span>
            </div>
        </div>

        <div class="rule-info">
            <span>🌸</span> يجب اختيار <strong>3 منتجات على الأقل</strong> لإتمام الطلب
        </div>

        <!-- السعر الإجمالي -->
        <div class="total-section">
            <span class="total-label">المجموع :</span>
            <span class="total-price" id="totalDisplay">0 <span>دج</span></span>
        </div>

        <!-- نموذج الطلب -->
        <div class="form-grid" id="orderForm">
            <div class="double-input">
                <div class="input-group">
                    <label>الاسم</label>
                    <input type="text" id="firstName" placeholder="الاسم الأول" autocomplete="given-name">
                </div>
                <div class="input-group">
                    <label>اللقب</label>
                    <input type="text" id="lastName" placeholder="اللقب" autocomplete="family-name">
                </div>
            </div>
            <div class="input-group">
                <label>رقم الهاتف</label>
                <input type="tel" id="phone" placeholder="مثال: 0555 12 34 56" autocomplete="tel-national">
            </div>
            <div class="input-group">
                <label>الولاية</label>
                <select id="wilayaSelect">
                    <option value="" disabled selected>-- اختر الولاية --</option>
                </select>
            </div>
            <div id="formError" class="error-message">يرجى ملء جميع الحقول واختيار 3 منتجات على الأقل.</div>
            <button class="submit-btn" id="submitOrderBtn" disabled>✨ تقديم الطلب</button>
            <div id="successMessage" class="success-message">تم إرسال طلبك بنجاح! سنتواصل معك قريباً 🌿</div>
        </div>
    </div>

    <script>
        (function() {
            // قائمة الولايات الجزائرية (58 ولاية)
            const wilayas = [
                "01 - أدرار", "02 - الشلف", "03 - الأغواط", "04 - أم البواقي", "05 - باتنة",
                "06 - بجاية", "07 - بسكرة", "08 - بشار", "09 - البليدة", "10 - البويرة",
                "11 - تمنراست", "12 - تبسة", "13 - تلمسان", "14 - تيارت", "15 - تيزي وزو",
                "16 - الجزائر العاصمة", "17 - الجلفة", "18 - جيجل", "19 - سطيف", "20 - سعيدة",
                "21 - سكيكدة", "22 - سيدي بلعباس", "23 - عنابة", "24 - قالمة", "25 - قسنطينة",
                "26 - المدية", "27 - مستغانم", "28 - المسيلة", "29 - معسكر", "30 - ورقلة",
                "31 - وهران", "32 - البيض", "33 - إليزي", "34 - برج بوعريريج", "35 - بومرداس",
                "36 - الطارف", "37 - تندوف", "38 - تيسمسيلت", "39 - الوادي", "40 - خنشلة",
                "41 - سوق أهراس", "42 - تيبازة", "43 - ميلة", "44 - عين الدفلى", "45 - النعامة",
                "46 - عين تموشنت", "47 - غرداية", "48 - غليزان", "49 - المغير", "50 - المنيعة",
                "51 - أولاد جلال", "52 - برج باجي مختار", "53 - بني عباس", "54 - تيميمون",
                "55 - تقرت", "56 - جانت", "57 - عين صالح", "58 - عين قزام"
            ];

            const wilayaSelect = document.getElementById('wilayaSelect');
            wilayas.forEach(w => {
                const option = document.createElement('option');
                option.value = w;
                option.textContent = w;
                wilayaSelect.appendChild(option);
            });

            // حالة المنتجات المختارة
            const selectedProducts = new Map(); // id -> {name, price}
            const MIN_PRODUCTS = 3;

            const totalDisplay = document.getElementById('totalDisplay');
            const submitBtn = document.getElementById('submitOrderBtn');
            const formError = document.getElementById('formError');
            const successMessage = document.getElementById('successMessage');

            // عناصر الإدخال
            const firstNameInput = document.getElementById('firstName');
            const lastNameInput = document.getElementById('lastName');
            const phoneInput = document.getElementById('phone');
            const wilayaInput = document.getElementById('wilayaSelect');

            // دالة تبديل اختيار المنتج
            window.toggleProduct = function(cardElement) {
                const id = cardElement.dataset.id;
                const name = cardElement.dataset.name;
                const price = parseInt(cardElement.dataset.price, 10);

                if (selectedProducts.has(id)) {
                    // إلغاء الاختيار
                    selectedProducts.delete(id);
                    cardElement.classList.remove('selected');
                } else {
                    // إضافة المنتج
                    selectedProducts.set(id, { name, price });
                    cardElement.classList.add('selected');
                }

                updateTotalAndUI();
            };

            function updateTotalAndUI() {
                let total = 0;
                selectedProducts.forEach(product => {
                    total += product.price;
                });

                totalDisplay.innerHTML = `${total.toLocaleString('ar-EG')} <span>دج</span>`;

                // تفعيل/تعطيل زر التقديم بناءً على عدد المنتجات
                const isValidProductCount = selectedProducts.size >= MIN_PRODUCTS;
                submitBtn.disabled = !isValidProductCount;

                // إخفاء رسالة الخطأ عند تغيير الاختيارات
                formError.style.display = 'none';
                successMessage.style.display = 'none';
            }

            // التحقق من الحقول
            function validateForm() {
                const firstName = firstNameInput.value.trim();
                const lastName = lastNameInput.value.trim();
                const phone = phoneInput.value.trim();
                const wilaya = wilayaInput.value;

                if (!firstName || !lastName || !phone || !wilaya) {
                    return false;
                }
                if (selectedProducts.size < MIN_PRODUCTS) {
                    return false;
                }
                // تحقق بسيط من رقم الهاتف (أرقام فقط وطول معقول)
                const phoneRegex = /^[0-9+\s()-]{8,}$/;
                if (!phoneRegex.test(phone)) {
                    return false;
                }
                return true;
            }

            function showError(message = "يرجى ملء جميع الحقول بشكل صحيح واختيار 3 منتجات.") {
                formError.textContent = message;
                formError.style.display = 'block';
                successMessage.style.display = 'none';
            }

            // مستمع الحدث لزر التقديم
            submitBtn.addEventListener('click', function(e) {
                e.preventDefault();
                
                if (!validateForm()) {
                    if (selectedProducts.size < MIN_PRODUCTS) {
                        showError(`يجب اختيار ${MIN_PRODUCTS} منتجات على الأقل. لقد اخترت ${selectedProducts.size}.`);
                    } else {
                        showError("يرجى إكمال الاسم، اللقب، رقم الهاتف والولاية.");
                    }
                    return;
                }

                // تجميع بيانات الطلب
                const orderData = {
                    products: Array.from(selectedProducts.values()),
                    total: Array.from(selectedProducts.values()).reduce((sum, p) => sum + p.price, 0),
                    customer: {
                        firstName: firstNameInput.value.trim(),
                        lastName: lastNameInput.value.trim(),
                        phone: phoneInput.value.trim(),
                        wilaya: wilayaInput.value
                    }
                };

                // محاكاة إرسال ناجح (في الواقع يمكن الإرسال إلى خادم)
                console.log('📦 تفاصيل الطلب:', orderData);
                
                // عرض رسالة نجاح
                successMessage.style.display = 'block';
                formError.style.display = 'none';
                
                // إعادة تعيين النموذج بعد الطلب (اختياري)
                // يمكنك إبقاء البيانات أو تفريغها حسب الرغبة
                // سنقوم بتفريغ الحقول والمنتجات المختارة لتجربة نظيفة
                setTimeout(() => {
                    // إلغاء تحديد جميع المنتجات
                    document.querySelectorAll('.product-card.selected').forEach(card => {
                        card.classList.remove('selected');
                    });
                    selectedProducts.clear();
                    updateTotalAndUI();
                    
                    // تفريغ الحقول
                    firstNameInput.value = '';
                    lastNameInput.value = '';
                    phoneInput.value = '';
                    wilayaInput.value = '';
                    submitBtn.disabled = true;
                    
                    // إخفاء رسالة النجاح بعد فترة
                    setTimeout(() => {
                        successMessage.style.display = 'none';
                    }, 4000);
                }, 1500);
            });

            // مراقبة الحقول لإخفاء الخطأ أثناء الكتابة
            [firstNameInput, lastNameInput, phoneInput, wilayaInput].forEach(input => {
                input.addEventListener('input', () => {
                    formError.style.display = 'none';
                });
                input.addEventListener('change', () => {
                    formError.style.display = 'none';
                });
            });

            // تهيئة أولية
            updateTotalAndUI();
        })();
    </script>
</body>
</html>
