        let currentLang='fr';
        const selectedProducts=new Map();
        let currentShipping=0;

        function extractWilayaName(full) { return full.replace(/^\d+\s*-\s*/, '').trim(); }

        function getShippingCost(fullWilaya, type) {
            const name = extractWilayaName(fullWilaya);
            if (!shippingCosts[name]) return 0;
            return type === 'home' ? shippingCosts[name][0] : shippingCosts[name][1];
        }

        window.updateShipping = function() {
            const wl = document.getElementById('wilayaSelect').value;
            const dt = document.querySelector('input[name="deliveryType"]:checked');
            const addr = document.getElementById('addressInput');
            const info = document.getElementById('shippingInfo');
            
            if (wl && dt) {
                currentShipping = getShippingCost(wl, dt.value);
                document.getElementById('shippingDisplay').textContent = currentShipping.toLocaleString('fr-FR') + ' DA';
                addr.disabled = false;
                info.style.display = 'block';
                const wName = extractWilayaName(wl);
                info.textContent = currentLang==='fr' ? 
                    `Frais de livraison pour ${wName} (${dt.value==='home'?'Domicile':'Bureau'}) : ${currentShipping} DA` :
                    `تكلفة التوصيل لـ ${wName} (${dt.value==='home'?'المنزل':'المكتب'}) : ${currentShipping} دج`;
            } else {
                currentShipping = 0;
                document.getElementById('shippingDisplay').textContent = '-- DA';
                addr.disabled = true;
                info.style.display = 'none';
            }
            updateAllTotals();
        };

        const tt={
            fr:{tagline:"Plus que la beauté • Un éclat qui inspire confiance",pricingText:'1 = 1500 DA | 2 = 3000 DA | 3+ = <strong>3500 DA</strong>',lblSubtotal:"Sous-total :",lblShipping:"Livraison :",lblTotal:"Total :",lblFirstName:"Prénom",lblLastName:"Nom",lblPhone:"Téléphone",lblWilaya:"Wilaya",lblDaira:"Daïra",lblDelivery:"Type de livraison",optHome:"🏠 Domicile",optOffice:"🏢 Bureau",lblAddress:"Adresse exacte",firstNamePlaceholder:"Votre prénom",lastNamePlaceholder:"Votre nom",phonePlaceholder:"Ex: 0555 12 34 56",addressPlaceholder:"Rue, N°, Commune...",submitBtn:"Commander ✨",errorSelect:"Sélectionnez au moins 1 produit.",errorFields:"Remplissez tous les champs.",errorDelivery:"Choisissez le type de livraison.",successMsg:"✅ Commande envoyée ! 🌿",errorTelegram:"❌ Erreur. Réessayez.",currency:"DA"},
            ar:{tagline:"أكثر من جمال • إشراقة تلهب الثقة",pricingText:'1 = 1500 دج | 2 = 3000 دج | 3+ = <strong>3500 دج</strong>',lblSubtotal:"المجموع الفرعي :",lblShipping:"التوصيل :",lblTotal:"المجموع :",lblFirstName:"الاسم",lblLastName:"اللقب",lblPhone:"رقم الهاتف",lblWilaya:"الولاية",lblDaira:"الدائرة",lblDelivery:"نوع التوصيل",optHome:"🏠 المنزل",optOffice:"🏢 المكتب",lblAddress:"العنوان بالضبط",firstNamePlaceholder:"أدخل اسمك",lastNamePlaceholder:"أدخل لقبك",phonePlaceholder:"Ex: 0555 12 34 56",addressPlaceholder:"الشارع، الرقم، البلدية...",submitBtn:"✨ أرسل الطلب",errorSelect:"اختر منتجاً واحداً على الأقل.",errorFields:"املأ جميع الحقول.",errorDelivery:"اختر نوع التوصيل.",successMsg:"✅ تم الإرسال! 🌿",errorTelegram:"❌ خطأ. حاول مجدداً.",currency:"دج"}
        };

        function populateWilayas(lang){
            const s=document.getElementById('wilayaSelect');
            s.innerHTML=`<option value="" disabled selected>${lang==='fr'?'-- Sélectionnez --':'-- اختر الولاية --'}</option>`;
            Object.keys(wilayasData).forEach(w=>{const o=document.createElement('option');o.value=w;o.textContent=w;s.appendChild(o);});
            resetDairaSelect(lang);
        }

        function resetDairaSelect(lang){
            const s=document.getElementById('dairaSelect');
            s.innerHTML=`<option value="" disabled selected>${lang==='fr'?'-- Choisissez wilaya --':'-- اختر الولاية أولا --'}</option>`;
            s.disabled=true;
        }

        document.getElementById('wilayaSelect').addEventListener('change',function(){
            const sw=this.value;const s=document.getElementById('dairaSelect');s.innerHTML='';
            if(sw&&wilayasData[sw]){
                const d=document.createElement('option');d.value='';d.disabled=true;d.selected=true;
                d.textContent=currentLang==='fr'?'-- Sélectionnez daïra --':'-- اختر الدائرة --';
                s.appendChild(d);
                wilayasData[sw].forEach(dr=>{const o=document.createElement('option');o.value=dr;o.textContent=dr;s.appendChild(o);});
                s.disabled=false;
            }else{resetDairaSelect(currentLang);}
            updateShipping();
        });

        window.switchLanguage=function(lang){
            currentLang=lang;const t=tt[lang];
            document.body.classList.toggle('rtl',lang==='ar');
            document.documentElement.dir=lang==='ar'?'rtl':'ltr';
            document.getElementById('btnFr').classList.toggle('active',lang==='fr');
            document.getElementById('btnAr').classList.toggle('active',lang==='ar');
            ['tagline','lblSubtotal','lblShipping','lblTotal','lblFirstName','lblLastName','lblPhone','lblWilaya','lblDaira','lblDelivery','lblAddress','optHome','optOffice'].forEach(id=>{
                const el=document.getElementById(id);
                if(el) el.textContent=t[id];
            });
            document.getElementById('pricingText').innerHTML=t.pricingText;
            document.getElementById('firstName').placeholder=t.firstNamePlaceholder;
            document.getElementById('lastName').placeholder=t.lastNamePlaceholder;
            document.getElementById('phone').placeholder=t.phonePlaceholder;
            document.getElementById('addressInput').placeholder=t.addressPlaceholder;
            document.getElementById('submitOrderBtn').textContent=t.submitBtn;
            document.getElementById('shippingDisplay').textContent = currentShipping ? currentShipping.toLocaleString('fr-FR') + ' ' + t.currency : '-- ' + t.currency;
            document.getElementById('subtotalDisplay').textContent = calcSubtotal().toLocaleString('fr-FR') + ' ' + t.currency;
            document.getElementById('totalDisplay').textContent = (calcSubtotal() + currentShipping).toLocaleString('fr-FR') + ' ' + t.currency;
            populateWilayas(lang);
            document.getElementById('formError').style.display='none';
            document.getElementById('successMessage').style.display='none';
            if(currentShipping) updateShipping();
        };

        function calcSubtotal() { return calcPrice(selectedProducts.size); }
        function calcPrice(c){if(c===0)return 0;if(c===1)return 1500;if(c===2)return 3000;return 3500;}

        function updateAllTotals(){
            const sub = calcSubtotal();
            const cur = tt[currentLang].currency;
            document.getElementById('subtotalDisplay').textContent = sub.toLocaleString('fr-FR') + ' ' + cur;
            document.getElementById('shippingDisplay').textContent = currentShipping ? currentShipping.toLocaleString('fr-FR') + ' ' + cur : '-- ' + cur;
            document.getElementById('totalDisplay').textContent = (sub + currentShipping).toLocaleString('fr-FR') + ' ' + cur;
        }

        window.toggleProduct=function(card){
            const id=card.dataset.id;
            if(selectedProducts.has(id)){selectedProducts.delete(id);card.classList.remove('selected');}
            else{selectedProducts.set(id,{name:card.dataset.name,price:parseInt(card.dataset.price)});card.classList.add('selected');}
            updateAllTotals();
            document.getElementById('submitOrderBtn').disabled = selectedProducts.size === 0;
        };

        document.getElementById('submitOrderBtn').addEventListener('click',async function(e){
            e.preventDefault();const t=tt[currentLang];
            const fn=document.getElementById('firstName').value.trim();
            const ln=document.getElementById('lastName').value.trim();
            const ph=document.getElementById('phone').value.trim();
            const wl=document.getElementById('wilayaSelect').value;
            const dr=document.getElementById('dairaSelect').value;
            const dt=document.querySelector('input[name="deliveryType"]:checked');
            const addr=document.getElementById('addressInput').value.trim();
            const er=document.getElementById('formError');
            const sm=document.getElementById('successMessage');
            const btn=document.getElementById('submitOrderBtn');

            if(!fn||!ln||!ph||!wl||!dr||!dt||!addr||selectedProducts.size===0){
                if(selectedProducts.size===0) er.textContent=t.errorSelect;
                else if(!dt) er.textContent=t.errorDelivery;
                else er.textContent=t.errorFields;
                er.style.display='block';return;
            }
            if(!/^[0-9+\s()-]{8,}$/.test(ph)){er.textContent='Numéro invalide';er.style.display='block';return;}

            btn.disabled=true;btn.textContent='⏳ ...';er.style.display='none';sm.style.display='none';

            const count=selectedProducts.size;const sub=calcSubtotal();const total=sub+currentShipping;
            let pl='';selectedProducts.forEach(p=>{pl+='  • '+p.name+'\n';});
            let sv='';if(count>=3) sv='\n💸 Économisé: '+(count*1500-sub).toLocaleString('fr-FR')+' DA';

            try{
                const res=await fetch(WORKER_URL,{
                    method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({
                        products:Array.from(selectedProducts.values()),
                        count,subtotal:sub,shipping:currentShipping,total,savings:sv,
                        deliveryType:dt.value,
                        customer:{firstName:fn,lastName:ln,phone:ph,wilaya:wl,daira:dr,address:addr}
                    })
                });
                const data=await res.json();
                if(data.success){
                    sm.textContent=t.successMsg;sm.style.display='block';
                    document.querySelectorAll('.product-card.selected').forEach(c=>c.classList.remove('selected'));
                    selectedProducts.clear();
                    document.getElementById('firstName').value='';document.getElementById('lastName').value='';
                    document.getElementById('phone').value='';document.getElementById('addressInput').value='';
                    document.getElementById('wilayaSelect').value='';resetDairaSelect(currentLang);
                    document.querySelectorAll('input[name="deliveryType"]').forEach(r=>r.checked=false);
                    document.getElementById('addressInput').disabled=true;
                    currentShipping=0;updateAllTotals();
                    document.getElementById('submitOrderBtn').disabled=true;
                    setTimeout(()=>{sm.style.display='none';},5000);
                }else{er.textContent=t.errorTelegram;er.style.display='block';}
            }catch(err){er.textContent=t.errorTelegram;er.style.display='block';}
            btn.disabled=false;btn.textContent=t.submitBtn;
        });

        populateWilayas('fr');updateAllTotals();
    </script>
